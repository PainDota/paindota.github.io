<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/new-testimonials.css">
<script src="js/new-testimonials.js"></script>

</head>

<body>

<div class="container my-4">

<div class="rank-card">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">
            <img src="images/reviews/pfp/1.png" class="pfp">

            <div>
                <div class="name-text">Keiths</div>
                <div class="text-accent sub-text">
                    Support
                    <img src="images/badges/roles/support.svg" class="role-icon">
                    / Mid
                    <img src="images/badges/roles/midlane.svg" class="role-icon">
                    / Off
                    <img src="images/badges/roles/offlane.svg" class="role-icon">
                </div>
            </div>
        </div>

    </div>

    <div class="soft-divider mt-1 mt-md-2 mt-lg-3"></div>

    <!-- RANK -->
    <div class="d-flex justify-content-center align-items-center gap-2">

        <div class="text-end text-center">
            <div class="sub-text">Starting Rank</div>
            <div class="rank-text">Ancient V</div>
        </div>

        <img src="images/badges/ranks/ancient.svg" class="rank-icon">

        <div class="arrow">→</div>

        <img src="images/badges/ranks/immortal.svg" class="rank-icon">

        <div class="text-start text-center">
            <div class="sub-text">Current Rank</div>
            <div class="rank-text">Immortal (5.7k)</div>
        </div>

    </div>

    <div class="soft-divider mt-1 mt-md-2 mt-lg-3"></div>

    <!-- STATS -->
    <div class="stats-wrapper">

        <div class="stats-block">
            <div class="sub-text fw-bold">MMR Gained</div>
            <div class="fw-bold">+2000</div>
        </div>

        <div class="stats-block">
            <div class="sub-text fw-bold">Time Taken</div>
            <div class="fw-bold">2 months</div>
        </div>

    </div>

    <!-- QUOTE -->
    <div class="quote-text text-center mt-1 mt-md-2 mt-lg-3">
        <span class="text-accent fs-3">“</span>
        With Balloon's coaching, the <b>road to 7K feels like a breeze</b>.
        Best coach ever, 10/10.
    </div>

    <!-- IMAGE -->
    <div class="text-center mt-1 mt-md-2 mt-lg-3">

        <div class="preview-wrapper">
            <img src="images/reviews/ss/1.jpeg"
                 class="preview-img"
                 onclick="openImage(this.src)">
            <img src="images/icons/uil_focus.svg" class="zoom-overlay">
        </div>

    </div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="imageModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border-0">
        <div class="modal-body text-center p-2">
            <img id="modalImage" class="img-fluid rounded">
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
