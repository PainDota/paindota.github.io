<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at top, #141420, #0e0e10);
    min-height: 100vh;
}

/* CARD */
.rank-card {
    max-width: 820px;
    margin: auto;
    border-radius: 18px;
    padding: 18px;

    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);

    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.rank-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
}

/* TEXT */
.name-text { font-size: 1.25rem; font-weight: 600; }
.sub-text { font-size: 0.85rem; color: #6b7280; }
.rank-text { font-size: 1rem; font-weight: 700; }

.text-accent { color: #E9133F; }

/* PFP */
.pfp {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(233,19,63,0.4);
}

/* ROLE ICON */
.role-icon {
    width: 14px;
    height: 14px;
    margin: 0 2px;
    vertical-align: -2px;
}

/* RANK ICON */
.rank-icon {
    width: 55px;
}

/* ARROW */
.arrow {
    font-size: 1.2rem;
    color: #E9133F;
}

/* DIVIDER */
.soft-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,0,0,0.15), transparent);
    margin: 10px 0;
}

/* STATS */
.stats-wrapper {
    display: flex;
    gap: 10px;
    max-width: 700px;
    margin: auto;
}

.stats-block {
    flex: 1;
    background: linear-gradient(135deg, #031330, #0a1b3d);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    color: white;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

/* QUOTE */
.quote-text {
    font-size: 0.95rem;
    margin-top: 10px;
}

/* IMAGE */
.preview-wrapper {
    position: relative;
    display: inline-block;
}

.preview-img {
    width: 150px;
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.preview-img:hover {
    transform: scale(1.03);
}

.zoom-overlay {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 20px;
    height: 20px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container my-4">

<div class="rank-card">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">
            <img src="images/reviews/pfp/1.png" class="pfp">

            <div>
                <div class="name-text">Keith</div>
                <div class="text-accent sub-text">
                    Support
                    <img src="images/badges/roles/support.svg" class="role-icon">
                    / Mid
                    <img src="images/badges/roles/midlane.svg" class="role-icon">
                    / Off
                    <img src="images/badges/roles/offlane.svg" class="role-icon">
                </div>
            </div>
        </div>

    </div>

    <div class="soft-divider"></div>

    <!-- RANK -->
    <div class="d-flex justify-content-center align-items-center gap-3">

        <div class="text-end text-center">
            <div class="sub-text">Starting Rank</div>
            <div class="rank-text">Ancient V</div>
        </div>

        <img src="images/badges/ranks/ancient.svg" class="rank-icon">

        <div class="arrow">→</div>

        <img src="images/badges/ranks/immortal.svg" class="rank-icon">

        <div class="text-start text-center">
            <div class="sub-text">Current Rank</div>
            <div class="rank-text">Immortal</div>
        </div>

    </div>

    <div class="soft-divider"></div>

    <!-- STATS -->
    <div class="stats-wrapper">

        <div class="stats-block">
            <div class="sub-text">MMR Gained</div>
            <div class="fw-bold">+2000</div>
        </div>

        <div class="stats-block">
            <div class="sub-text">Time Taken</div>
            <div class="fw-bold">2 months</div>
        </div>

    </div>

    <!-- QUOTE -->
    <div class="quote-text text-center mt-3">
        <span class="text-accent fs-3">“</span>
        With Balloon's coaching, the <b>road to 7K feels like a breeze</b>.
        Best coach ever, 10/10.
    </div>

    <!-- IMAGE -->
    <div class="text-center mt-3">

        <div class="preview-wrapper">
            <img src="images/reviews/ss/1.jpeg"
                 class="preview-img"
                 onclick="openImage(this.src)">
            <img src="images/icons/uil_focus.svg" class="zoom-overlay">
        </div>

    </div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="imageModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border-0">
        <div class="modal-body text-center p-2">
            <img id="modalImage" class="img-fluid rounded">
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function openImage(src) {
    document.getElementById("modalImage").src = src;
    new bootstrap.Modal(document.getElementById('imageModal')).show();
}
</script>

</body>
</html>
